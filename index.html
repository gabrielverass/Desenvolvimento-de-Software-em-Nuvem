<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- index.html - Página principal -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursinho Matemática | Aprenda Matemática Online</title>

   <!-- estilo da página login e cadastro de usuario -->
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

        /* Forms */
        .card-auth {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--shadow);
            max-width: 400px;
            margin: 40px auto;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover { background: var(--primary-dark); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-outline:hover { background: #e8f5e9; }

        /* Grid de Cursos */
        #lista-cursos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .curso-card {
            background: var(--white);
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            border-top: 5px solid var(--primary);
        }

        .curso-card:hover { transform: translateY(-5px); }
        .curso-card h3 { margin-top: 0; color: var(--primary-dark); }
        .curso-card .badge {
            background: #e8f5e9;
            color: var(--primary-dark);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .price { font-size: 1.2rem; font-weight: bold; color: #2e7d32; margin-top: 10px; }

        /* Admin Area */
        #admin-area {
            background: #fff3e0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px dashed #ff9800;
        }

        .hidden { display: none; }
        .loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0">🏫 Cursinho Matemática</h2>
        <div id="user-status">
            </div>
    </header>

    <div class="container">
        
        <div id="login-area" class="card-auth">
            <h2>Entrar</h2>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="senha" placeholder="Sua senha">
            <button onclick="login()" id="btn-login">Entrar</button>
            <button onclick="alternarForm(true)" class="btn-outline">Criar nova conta</button>
        </div>

        <div id="cadastro-area" class="card-auth hidden">
            <h2>Cadastro</h2>
            <input type="text" id="cadastro-nome" placeholder="Nome Completo">
            <input type="text" id="cadastro-cpf" placeholder="CPF (11 dígitos)" maxlength="11">
            <input type="text" id="cadastro-dataNascimento" placeholder="Data Nascimento">
            <input type="email" id="cadastro-email" placeholder="E-mail">
            <input type="password" id="cadastro-senha" placeholder="Senha">
            <input type="password" id="cadastro-confirma" placeholder="Confirme a Senha">
            <button onclick="cadastrarUsuario()" id="btn-cad">Finalizar Cadastro</button>
            <button onclick="alternarForm(false)" class="btn-outline">Já tenho conta</button>
        </div>

        <div id="admin-area" class="hidden">
            <h3>🛠 Painel do Instrutor</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="titulo" placeholder="Título do Curso">
                <input type="text" id="nivel" placeholder="Nível (Ex: Básico)">
                <input type="number" id="preco" placeholder="Preço (Ex: 49.90)">
                <input type="text" id="descricao" placeholder="Breve descrição">
            </div>
            <button onclick="criarCurso()" style="width: auto;">+ Adicionar Curso</button>
        </div>

        <div id="cursos-secao">
            <h2>Cursos Disponíveis</h2>
            <div id="lista-cursos" class="loading">Carregando cursos...</div>
        </div>

    </div>

    <script>
        const API_URL = 'https://seu-backend.render.com/api';

        // --- UTILITÁRIOS ---
        function alternarForm(showCadastro) {
            document.getElementById('login-area').classList.toggle('hidden', showCadastro);
            document.getElementById('cadastro-area').classList.toggle('hidden', !showCadastro);
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        // --- LÓGICA DE CURSOS ---
        async function carregarCursos() {
            const lista = document.getElementById('lista-cursos');
            try {
                const response = await fetch(`${API_URL}/cursos`);
                if (!response.ok) throw new Error('Falha na API');

                const data = await response.json();
                const cursos = Array.isArray(data) ? data : (data.cursos || []);

                if (cursos.length === 0) {
                    lista.innerHTML = "<p>Nenhum curso encontrado.</p>";
                    return;
                }

                lista.innerHTML = cursos.map(curso => `
                    <div class="curso-card">
                        <span class="badge">${curso.nivel}</span>
                        <h3>${curso.titulo}</h3>
                        <p>${curso.descricao}</p>
                        <div class="price">${formatarMoeda(curso.preco)}</div>
                        <button onclick="alert('Funcionalidade de compra em breve!')" style="margin-top:15px">Ver Detalhes</button>
                    </div>
                `).join('');
            } catch (error) {
                lista.innerHTML = "<p style='color:red'>Erro ao carregar cursos. Verifique o console.</p>";
            }
        }

        // --- AUTENTICAÇÃO ---
        async function login() {
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            if(!email || !senha) return alert("Preencha os campos!");

            try {
                btn.disabled = true;
                btn.innerText = "Autenticando...";

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.role);
                    alert('Bem-vindo!');
                    window.location.reload(); // Recarrega para atualizar estado da UI
                } else {
                    alert(data.message || 'Dados inválidos');
                }
            } catch (err) {
                alert("Erro ao conectar com servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar";
            }
        }

        async function cadastrarUsuario() {
            const dados = {
                nome: document.getElementById('cadastro-nome').value,
                cpf: document.getElementById('cadastro-cpf').value,
                dataNascimento: document.getElementById('cadastro-dataNascimento').value,
                email: document.getElementById('cadastro-email').value,
                senha: document.getElementById('cadastro-senha').value
            };

            if (dados.senha !== document.getElementById('cadastro-confirma').value) {
                return alert("As senhas não conferem!");
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, { // Ajuste para seu endpoint real
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    alternarForm(false);
                } else {
                    const err = await response.json();
                    alert(err.message || 'Erro no cadastro');
                }
            } catch (e) {
                alert("Simulação: Cadastro enviado (configure o endpoint real).");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // --- ÁREA ADMIN ---
        async function criarCurso() {
            const token = localStorage.getItem('token');
            const curso = {
                titulo: document.getElementById('titulo').value,
                descricao: document.getElementById('descricao').value,
                nivel: document.getElementById('nivel').value,
                preco: parseFloat(document.getElementById('preco').value)
            };

            const response = await fetch(`${API_URL}/cursos`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(curso)
            });

            if (response.ok) {
                alert('Curso publicado!');
                carregarCursos();
            } else {
                alert('Erro ao criar curso. Verifique se você é ADMIN.');
            }
        }

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            carregarCursos();
            
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            const statusDiv = document.getElementById('user-status');

            if (token) {
                document.getElementById('login-area').classList.add('hidden');
                statusDiv.innerHTML = `<button onclick="logout()" class="btn-outline" style="width:auto">Sair</button>`;
                
                if (role === 'ADMIN') {
                    document.getElementById('admin-area').classList.remove('hidden');
                }
            }
        };
    </script>
</body>
</html>
